name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r environment/requirements-dev.txt

      - name: Run unit tests
        run: bash scripts/run_tests.sh


      - name: Run C++ tracking core checks
        run: bash scripts/check_cpp_tracking_core.sh

      - name: Check required artifacts and stale claims
        run: python scripts/check_artifacts_exist.py
