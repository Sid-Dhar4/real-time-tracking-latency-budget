sweep:
  name: confidence_sweep_yolov8n_bytetrack_seq0000
  variable: detector_confidence_threshold
  values:
    - 0.25
    - 0.35
    - 0.50
    - 0.65

detector_tracker:
  detector_weights: yolov8n.pt
  tracker_config: bytetrack.yaml
  device: cpu
  image_size: 640
  iou_threshold: 0.7

dataset:
  name: kitti_tracking
  sequence: "0000"
  image_dir: data/kitti_tracking/training/image_02/0000
  label_file: data/kitti_tracking/training/label_02/0000.txt
  eval_class: Car
  eval_iou_threshold: 0.5

outputs:
  sweep_results_csv: results/sweep_results.csv
  log_file: results/logs/m5_confidence_sweep.txt
  pareto_plot: results/plots/m5_confidence_sweep_latency_idf1.png

notes:
  - This is a local confidence-threshold sweep, not official KITTI leaderboard evaluation.
  - The goal is to show the accuracy-latency/precision-recall tradeoff.
  - CPU is used because NVIDIA driver is not currently working through nvidia-smi.
