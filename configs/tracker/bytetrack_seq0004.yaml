tracker:
  name: bytetrack
  integration: ultralytics
  detector_weights: yolov8n.pt
  ultralytics_tracker_config: bytetrack.yaml
  device: cpu
  image_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.7

dataset:
  name: kitti_tracking
  sequence: "0004"
  image_dir: data/kitti_tracking/training/image_02/0004

outputs:
  tracks_csv: results/tracks/yolov8n_bytetrack_seq0004_tracks.csv
  video_path: results/videos/yolov8n_bytetrack_seq0004.mp4
  log_file: results/logs/m21_seq0004_tracker.txt

video:
  fps: 10

notes:
  - ByteTrack extension sequence for multi-sequence benchmark coverage.
