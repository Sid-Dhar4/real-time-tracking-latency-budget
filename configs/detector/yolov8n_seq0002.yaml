detector:
  name: yolov8n
  weights: yolov8n.pt
  framework: ultralytics
  device: cpu
  image_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.7

dataset:
  name: kitti_tracking
  sequence: "0002"
  image_dir: data/kitti_tracking/training/image_02/0002

outputs:
  detections_csv: results/detections/yolov8n_seq0002_detections.csv
  sample_visualization: results/plots/yolov8n_seq0002_sample.jpg
  log_file: results/logs/m21_seq0002_detector.txt

notes:
  - CPU is used because nvidia-smi is not currently working.
  - This is detector inference only.
